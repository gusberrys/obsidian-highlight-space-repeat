name: Build & Test
on:
  pull_request:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Setup
      uses: ./.github/actions/setup
    - name: Build CSS
      run: npm run build:css
    - name: Bundle plugin
      run: node esbuild.config.mjs production
    - name: Check build artifacts
      run: |
        if [ ! -f main.js ]; then
          echo "Error: main.js not created"
          exit 1
        fi
        echo "Build successful - main.js created"

  test:
    runs-on: ubuntu-latest
    steps:
    - name: Setup
      uses: ./.github/actions/setup

    - name: Run chip tests
      run: npx jest src/__tests__/chip/01-Chip-Creation.test.ts src/__tests__/chip/02-Chip-Activation.test.ts
