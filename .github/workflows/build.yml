name: Build
on:
  pull_request:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'npm'
    - name: Install dependencies
      run: npm ci
    - name: Build CSS
      run: npm run build:css
    - name: Bundle plugin
      run: node esbuild.config.mjs production
    - name: Check build artifacts
      run: |
        if [ ! -f main.js ]; then
          echo "Error: main.js not created"
          exit 1
        fi
        echo "Build successful - main.js created"
